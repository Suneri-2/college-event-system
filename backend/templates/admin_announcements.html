<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Announcements - College Event System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #5f0a87, #00c9a7);
    color: black;
    min-height: 100vh;
}
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px;
}
h1, h2 {
    text-align: center;
    margin-bottom: 20px;
}
/* Form */
.announcement-form {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    margin-bottom: 40px;
}
.announcement-form input, .announcement-form textarea {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    background: rgba(255,255,255,0.8);
}
.announcement-form button {
    background: linear-gradient(to right, #00c9a7, #6a11cb);
    color: black;
    font-weight: bold;
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.announcement-form button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
table th, table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: black;
}
table th {
    background: rgba(255,255,255,0.15);
}
/* Back button */
.back-btn {
    display: inline-block;
    margin-top: 20px;
    background: linear-gradient(to right, #00c9a7, #6a11cb);
    color: black;
    font-weight: bold;
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
}
.back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="container">
    <h1>Manage Announcements</h1>

    <!-- Add Announcement Form -->
    <div class="announcement-form">
        <h2>Create Announcement</h2>
        <form method="POST" action="{{ url_for('admin_announcements') }}">
            <input type="text" name="title" placeholder="Title" required>
            <textarea name="message" placeholder="Message" required></textarea>
            <button type="submit">Send Announcement</button>
        </form>
    </div>

    <!-- Announcements List -->
    <table>
        <tr>
            <th>Title</th>
            <th>Message</th>
        </tr>
        {% for ann in announcements %}
        <tr>
            <td>{{ ann.title }}</td>
            <td>{{ ann.message }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="{{ url_for('admin_home') }}" class="back-btn">Back to Dashboard</a>
</div>

</body>
</html>
