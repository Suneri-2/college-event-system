<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - College Event System</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        /* Body and background */
        body {
            font-family: "Bookman Old Style","Bookman", serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4B0082, #00796B); /* dark lavender → teal/green */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: black;
        }

        /* SUN UNIVERSITY header */
        header {
            font-family: "Bookman Old Style","Bookman", serif; 
            font-size: 48px;
            font-weight: 900;
            color: #FFFF; /* Gold */
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* Form container */
        .form-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.4);
            width: 400px;
            text-align: center;
            color: black;
        }

        h2 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: white;
        }
        input[type="email"], input[type="password"], select {
    width: 100%;
    padding: 15px;
    margin: 10px 0 20px 0;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    font-size: 18px;
    appearance: none; /* Remove default arrow style for consistency */
    -webkit-appearance: none;
    -moz-appearance: none;
}

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            color: black;
            background: linear-gradient(135deg, #00796B, #4B0082);
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.85;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 16px;
        }

        .flash-message {
            background-color: #ff5100;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 16px;
            color: black;
        }
    </style>
</head>
<body>

    <header>SUN UNIVERSITY</header>

    <div class="form-box">
        <h2>Login</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="student">Student</option>
            </select>
            <button type="submit">Login</button>
        </form>

        <a href="{{ url_for('register') }}">Don't have an account? Register</a>
    </div>

</body>
</html>
