<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Events - College Event System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #5f0a87, #00c9a7);
    color: black;
    min-height: 100vh;
}
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px;
}
/* Back Button */
.back-btn {
    background: linear-gradient(to right, #6a11cb, #00c9a7);
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 30px;
}
/* Event Form */
.event-form {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    color: black;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    margin-bottom: 40px;
}
.event-form input, .event-form textarea {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    background: rgba(255,255,255,0.8);
}
.event-form button {
    background: linear-gradient(to right, #00c9a7, #6a11cb);
    color: black;
    font-weight: bold;
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.event-form button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
/* Events Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
table th, table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: black;
}
table th {
    background: rgba(255,255,255,0.15);
}
table td button {
    margin-right: 5px;
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}
.update-btn { background: #00c9a7; color: black; }
.delete-btn { background: #6a11cb; color: black; }
.update-btn:hover, .delete-btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<div class="container">
    <h1 style="margin-bottom: 20px;">Manage Events</h1>

    <!-- Back to Dashboard -->
    <a href="{{ url_for('admin_home') }}">
        <button class="back-btn">Back to Dashboard</button>
    </a>

    <!-- Add Event Form -->
    <div class="event-form">
        <h2>Add New Event</h2>
        <form method="POST" action="{{ url_for('admin_events') }}">
            <input type="text" name="title" placeholder="Event Title" required>
            <input type="text" name="date" placeholder="Date (DD-MM-YYYY)" required>
            <input type="text" name="time" placeholder="Time" required>
            <input type="text" name="venue" placeholder="Venue" required>
            <textarea name="description" placeholder="Description"></textarea>
            <button type="submit">Add Event</button>
        </form>
    </div>

    <!-- Update Event Form -->
    {% if event_to_update %}
    <div class="event-form">
        <h2>Update Event</h2>
        <form method="POST" action="{{ url_for('update_event', event_id=event_to_update.id) }}">
            <input type="text" name="title" value="{{ event_to_update.title }}" required>
            <input type="text" name="date" value="{{ event_to_update.date }}" required>
            <input type="text" name="time" value="{{ event_to_update.time }}" required>
            <input type="text" name="venue" value="{{ event_to_update.venue }}" required>
            <textarea name="description">{{ event_to_update.description }}</textarea>
            <button type="submit">Update Event</button>
        </form>
    </div>
    {% endif %}

    <!-- Events Table -->
    <table>
        <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Time</th>
            <th>Venue</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
        {% for event in events %}
        <tr>
            <td>{{ event.title }}</td>
            <td>{{ event.date }}</td>
            <td>{{ event.time }}</td>
            <td>{{ event.venue }}</td>
            <td>{{ event.description }}</td>
            <td>
                <a href="{{ url_for('update_event', event_id=event.id) }}">
                    <button class="update-btn">Update</button>
                </a>
                <a href="{{ url_for('delete_event', event_id=event.id) }}">
                    <button class="delete-btn">Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>
</body>
</html>
