<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Notifications - College Event System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #5f0a87, #00c9a7);
    color: black;
    min-height: 100vh;
}
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px;
}
/* Header */
h1 {
    text-align: center;
    margin-bottom: 30px;
}

/* Form */
.notification-form {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    color: black;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    margin-bottom: 40px;
}
.notification-form input, .notification-form textarea {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    background: rgba(255,255,255,0.8);
}
.notification-form button {
    background: linear-gradient(to right, #00c9a7, #6a11cb);
    color: black;
    font-weight: bold;
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.notification-form button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
table th, table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: black;
}
table th {
    background: rgba(255,255,255,0.15);
}
table td button {
    margin-right: 5px;
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}
.delete-btn { background: #6a11cb; color: black; }
.delete-btn:hover { opacity: 0.8; }

/* Back button */
.back-btn {
    display: inline-block;
    margin-top: 20px;
    background: linear-gradient(to right, #00c9a7, #6a11cb);
    color: black;
    font-weight: bold;
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
}
.back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="container">
    <h1>Manage Notifications</h1>

    <!-- Add Notification Form -->
    <div class="notification-form">
        <h2>Send New Notification</h2>
        <form method="POST" action="{{ url_for('admin_notifications') }}">
            <input type="text" name="title" placeholder="Notification Title" required>
            <textarea name="message" placeholder="Message" rows="4" required></textarea>
            <button type="submit">Send Notification</button>
        </form>
    </div>

    <!-- Notifications Table -->
    <table>
        <tr>
            <th>Title</th>
            <th>Message</th>
            <th>Action</th>
        </tr>
        {% for notification in notifications %}
        <tr>
            <td>{{ notification.title }}</td>
            <td>{{ notification.message }}</td>
            <td>
                <a href="{{ url_for('delete_notification', notification_id=notification.id) }}">
                    <button class="delete-btn">Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- Back to Dashboard -->
    <a href="{{ url_for('admin_home') }}" class="back-btn">Back to Dashboard</a>
</div>

</body>
</html>
