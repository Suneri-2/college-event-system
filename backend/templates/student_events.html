<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Events</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #4B0082, #00796B);
    color: white;
}

.container {
    padding: 40px;
}

h2 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

.card h3 {
    margin-bottom: 10px;
}

.card p {
    margin: 5px 0;
}

.btn {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(to right, #00796B, #4B0082);
    color: white;
}

.btn:hover {
    opacity: 0.8;
}

.back {
    margin-top: 30px;
    text-align: center;
}
</style>

</head>
<body>

<div class="container">

<h2>Available Events</h2>

<div class="grid">

{% for event in events %}
<div class="card">
    <h3>{{ event.title }}</h3>
    <p><b>Date:</b> {{ event.date }}</p>
    <p><b>Time:</b> {{ event.time }}</p>
    <p><b>Venue:</b> {{ event.venue }}</p>
    <p>{{ event.description }}</p>

    <!-- 🔥 REGISTER BUTTON -->
     <a href="{{ url_for('register_event', event_id=event.id) }}" class="btn"> 
        Register
    </a>
</div>
{% endfor %}

</div>

<div class="back">
    <a href="{{ url_for('student_dashboard') }}">
        <button class="btn">Back to Dashboard</button>
    </a>
</div>

</div>

</body>
</html>
