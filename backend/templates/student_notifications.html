<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications - College Event System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #5f0a87, #00c9a7);
            color: black;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: black;
        }
        table th {
            background: rgba(255,255,255,0.15);
        }
        /* Back button */
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background: linear-gradient(to right, #00c9a7, #6a11cb);
            color: black;
            font-weight: bold;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Notifications</h1>
        <table>
            <tr>
                <th>Title</th>
                <th>Message</th>
            </tr>
            {% for notification in notifications %}
            <tr>
                <td>{{ notification.title }}</td>
                <td>{{ notification.message }}</td>
            </tr>
            {% endfor %}
        </table>
        <a href="{{ url_for('student_dashboard') }}" class="back-btn">Back to Dashboard</a>
    </div>
</body>
</html>
