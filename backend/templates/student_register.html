<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Event</title>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4B0082, #00796B);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #00796B, #4B0082);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- ✅ POPUP -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <script>
      Swal.fire({
        icon: 'success',
        title: 'Success',
        text: '{{ messages[0] }}',
        confirmButtonColor: '#28a745',
        confirmButtonText: 'OK'
      }).then(() => {
        window.location.href = "{{ url_for('student_dashboard') }}";
      });
    </script>
  {% endif %}
{% endwith %}

<div class="form-box">
    <h2>Register for {{ event.title }}</h2>

    <form method="POST" action="{{ url_for('register_event', event_id=event.id) }}">
        <input type="text" name="student_name" placeholder="Full Name" value="{{ session['user_name'] }}" required>
        <input type="text" name="semester" placeholder="Semester" required>
        <input type="text" name="roll_no" placeholder="Roll Number" required>

        <button type="submit">Submit Registration</button>
    </form>

    <a href="{{ url_for('student_events') }}" class="back-btn">← Back to Events</a>
</div>

</body>
</html>
